- id: task-bar-has-role-attr
  purpose: "Every rendered regular task has data-gantt-role=\"task-bar\" and a task-id attribute."
  tags: [happy-path, dom]
  setup:
    tasks:
      - id: a
        text: Alpha
        start: "2026-05-01T00:00:00.000Z"
        end:   "2026-05-05T00:00:00.000Z"
        duration: 4
        progress: 0
        parentId: null
        type: task
        open: false
  when:
    kind: render
  then:
    - probe: dom.count
      selector: '[data-gantt-role="task-bar"][data-gantt-task-id="a"]'
      eq: 1

- id: snapshot-contains-all-bars
  purpose: "handle.snapshot() returns an entry for each flattened task."
  tags: [happy-path, handle]
  setup:
    tasks:
      - { id: a, text: A, start: "2026-05-01T00:00:00.000Z", end: "2026-05-05T00:00:00.000Z",
          duration: 4, progress: 0, parentId: null, type: task, open: false }
      - { id: b, text: B, start: "2026-05-06T00:00:00.000Z", end: "2026-05-10T00:00:00.000Z",
          duration: 4, progress: 0, parentId: null, type: task, open: false }
  when:
    kind: handle-method
    method: snapshot
  then:
    - probe: return.bars.length
      eq: 2
    - probe: return.bars[0].taskId
      eq: "a"

- id: date-at-x-monotonic
  purpose: "dateAtX returns an ISO string that falls within dateRange."
  tags: [happy-path, handle]
  setup:
    tasks:
      - { id: a, text: A, start: "2026-05-01T00:00:00.000Z", end: "2026-05-10T00:00:00.000Z",
          duration: 9, progress: 0, parentId: null, type: task, open: false }
  when:
    kind: handle-method
    method: dateAtX
    args: [100]
  then:
    - probe: return
      match: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T"

- id: validate-flags-negative-width
  purpose: "handle.validate() reports bar_negative_width when a bar has a negative $w (simulated by seeding)."
  tags: [regression, handle]
  setup:
    seed_store:                       # special hook: bypass normal recalculate
      flatTasks:
        - id: bad
          text: Broken
          start: "2026-05-01T00:00:00.000Z"
          end:   "2026-05-05T00:00:00.000Z"
          duration: 4
          progress: 0
          parentId: null
          type: task
          open: false
          $x: 100
          $y: 0
          $w: -10
          $h: 24
          $level: 0
      totalWidth: 400
      totalHeight: 24
  when:
    kind: handle-method
    method: validate
  then:
    - probe: return.ok
      eq: false
    - probe: return.issues[0].code
      eq: bar_negative_width

- id: weekend-cells-flagged
  purpose: "Scale cells falling on weekend days carry data-gantt-weekend=\"true\"."
  tags: [happy-path, dom]
  setup:
    tasks:
      - { id: a, text: A, start: "2026-05-04T00:00:00.000Z", end: "2026-05-15T00:00:00.000Z",
          duration: 11, progress: 0, parentId: null, type: task, open: false }
    config:
      scales: [ { unit: month, step: 1, format: "MMM yyyy" }, { unit: day, step: 1, format: "d" } ]
      cellWidth: 32
  when:
    kind: render
  then:
    - probe: dom.count
      selector: '[data-gantt-role="scale-cell"][data-gantt-weekend="true"]'
      gte: 1
